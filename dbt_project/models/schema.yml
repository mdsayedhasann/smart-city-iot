version: 2

models:
  - name: air_quality_hourly
    description: "Hourly average air quality per zone (Business Question 1)"
    columns:
      - name: zone_id
        description: "City zone identifier"
        tests:
          - not_null
      - name: hour
        description: "Hour the readings were aggregated into"
        tests:
          - not_null
      - name: avg_pm25
        description: "Average PM2.5 for the zone and hour"
        tests:
          - not_null

  - name: threshold_breaches
    description: "Hours where average PM2.5 exceeded the safety threshold (Business Question 1)"
    columns:
      - name: zone_id
        tests:
          - not_null
      - name: avg_pm25
        tests:
          - not_null

  - name: traffic_hourly
    description: "Hourly traffic volume and speed per zone (Business Question 2)"
    columns:
      - name: zone_id
        tests:
          - not_null
      - name: hour
        tests:
          - not_null

  - name: energy_hourly
    description: "Hourly energy consumption and peak demand per zone (Business Question 3)"
    columns:
      - name: zone_id
        tests:
          - not_null
      - name: hour
        tests:
          - not_null

  - name: sensor_health
    description: "Health status per air-quality sensor (Business Question 4)"
    columns:
      - name: sensor_id
        description: "Sensor identifier - one row per sensor"
        tests:
          - not_null
          - unique
      - name: health_status
        tests:
          - not_null

  - name: traffic_pollution_correlation
    description: "Correlation between traffic volume and PM2.5 per zone (Business Question 5)"
    columns:
      - name: zone_id
        description: "One row per zone"
        tests:
          - not_null
          - unique