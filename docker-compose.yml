services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: smartcity_timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: cityadmin
      POSTGRES_PASSWORD: citypass123
    volumes:
      - timescale_data:/var/lib/postgresql/data

volumes:
  timescale_data: